<div class="p-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">회원 관리</h1>
    <p-button label="회원 추가" icon="pi pi-plus" (onClick)="goToCreate()" />
  </div>

  <!-- Status filter tabs -->
  <div class="flex gap-1 mb-4 border-b border-gray-200">
    @for (tab of statusTabs; track tab.value) {
      <button
        (click)="onStatusTab(tab.value)"
        class="px-4 py-2 text-sm font-medium transition-colors border-b-2 -mb-px"
        [class]="activeStatus() === tab.value
          ? 'border-primary-500 text-primary-600'
          : 'border-transparent text-gray-500 hover:text-gray-700'"
      >
        {{ tab.label }}
      </button>
    }
  </div>

  <!-- Search -->
  <div class="mb-4">
    <span class="p-input-icon-left w-full max-w-sm">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        placeholder="이름 또는 이메일 검색"
        class="w-full"
        [ngModel]="searchTerm"
        (ngModelChange)="onSearch($event)"
      />
    </span>
  </div>

  <!-- Table -->
  <p-table
    [value]="members()"
    [loading]="loading()"
    [rows]="size"
    [totalRecords]="totalRecords()"
    [paginator]="true"
    [lazy]="true"
    (onLazyLoad)="onPageChange($event)"
    rowHover
    styleClass="p-datatable-sm"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>이름</th>
        <th>이메일</th>
        <th>그룹</th>
        <th>상태</th>
        <th class="w-32">관리</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-member>
      <tr class="cursor-pointer" (click)="goToDetail(member)">
        <td class="font-medium">{{ member.lastName }}{{ member.firstName }}</td>
        <td class="text-gray-500">{{ member.email ?? '—' }}</td>
        <td class="text-gray-500">{{ member.groupName ?? '—' }}</td>
        <td>
          <p-tag
            [value]="statusLabel(member.memberStatus)"
            [severity]="statusSeverity(member.memberStatus)"
          />
        </td>
        <td>
          <div class="flex gap-1" (click)="$event.stopPropagation()">
            <!-- Approve: shown for PENDING -->
            @if (member.memberStatus === 'PENDING') {
              <p-button
                icon="pi pi-check"
                severity="success"
                [text]="true"
                size="small"
                pTooltip="승인"
                (onClick)="confirmApprove(member, $event)"
              />
            }
            <!-- Reactivate: shown for INACTIVE -->
            @if (member.memberStatus === 'INACTIVE') {
              <p-button
                icon="pi pi-refresh"
                severity="info"
                [text]="true"
                size="small"
                pTooltip="재활성"
                (onClick)="confirmApprove(member, $event)"
              />
            }
            <p-button
              icon="pi pi-trash"
              severity="danger"
              [text]="true"
              size="small"
              pTooltip="삭제"
              (onClick)="confirmDelete(member, $event)"
            />
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center py-8 text-gray-400">
          검색 결과가 없습니다.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-confirmDialog />
<p-toast />
