<div class="p-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">회원 관리</h1>
    <p-button
      label="회원 추가"
      icon="pi pi-plus"
      (onClick)="goToCreate()"
    />
  </div>

  <!-- Search -->
  <div class="mb-4">
    <span class="p-input-icon-left w-full max-w-sm">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        placeholder="이름 또는 이메일 검색"
        class="w-full"
        [ngModel]="searchTerm"
        (ngModelChange)="onSearch($event)"
      />
    </span>
  </div>

  <!-- Table -->
  <p-table
    [value]="members()"
    [loading]="loading()"
    [rows]="size"
    [totalRecords]="totalRecords()"
    [paginator]="true"
    [lazy]="true"
    (onLazyLoad)="onPageChange($event)"
    rowHover
    styleClass="p-datatable-sm"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>이름</th>
        <th>이메일</th>
        <th>그룹</th>
        <th>상태</th>
        <th class="w-24">관리</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-member>
      <tr class="cursor-pointer" (click)="goToDetail(member)">
        <td class="font-medium">{{ member.lastName }}{{ member.firstName }}</td>
        <td class="text-gray-500">{{ member.email ?? '—' }}</td>
        <td class="text-gray-500">{{ member.groupName ?? '—' }}</td>
        <td>
          <p-tag
            [value]="statusLabel(member.memberStatus)"
            [severity]="statusSeverity(member.memberStatus)"
          />
        </td>
        <td>
          <p-button
            icon="pi pi-trash"
            severity="danger"
            [text]="true"
            size="small"
            (onClick)="confirmDelete(member, $event); $event.stopPropagation()"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center py-8 text-gray-400">
          검색 결과가 없습니다.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-confirmDialog />
<p-toast />
