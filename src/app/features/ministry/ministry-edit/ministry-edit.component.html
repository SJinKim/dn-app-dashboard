<div class="p-6 max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <p-button icon="pi pi-arrow-left" [text]="true" severity="secondary" (onClick)="goBack()" />
    <h1 class="text-2xl font-bold text-gray-800">{{ isEdit ? '부서 수정' : '부서 추가' }}</h1>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-12">
      <p-progressSpinner strokeWidth="4" />
    </div>
  } @else {
    <p-card>
      <div class="flex flex-col gap-4">
        <!-- Name -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700">부서명 <span class="text-red-500">*</span></label>
          <input pInputText [(ngModel)]="form.name" placeholder="부서명" maxlength="100" />
        </div>

        <!-- Short description -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700">짧은 설명 <span class="text-red-500">*</span></label>
          <input pInputText [(ngModel)]="form.shortDescription" placeholder="짧은 설명" maxlength="200" />
        </div>

        <!-- Long description -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700">긴 설명</label>
          <textarea
            pTextarea
            [(ngModel)]="form.longDescription"
            rows="4"
            placeholder="긴 설명 (선택)"
            maxlength="2000"
          ></textarea>
        </div>

        <!-- Leader publicId -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700">리더 publicId</label>
          <input pInputText [(ngModel)]="form.leaderPublicId" placeholder="리더 회원 publicId (선택)" />
        </div>

        <!-- Image URL -->
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700">이미지 URL</label>
          <input pInputText [(ngModel)]="form.imageUrl" placeholder="이미지 URL (선택)" />
        </div>

        <!-- isActive — edit only -->
        @if (isEdit) {
          <div class="flex items-center gap-2">
            <p-checkbox [(ngModel)]="form.isActive" [binary]="true" inputId="isActive" />
            <label for="isActive" class="text-sm font-medium text-gray-700">활성 상태</label>
          </div>
        }

        <!-- Actions -->
        <div class="flex gap-2 justify-end pt-2">
          <p-button label="취소" severity="secondary" [text]="true" (onClick)="goBack()" />
          <p-button
            [label]="isEdit ? '저장' : '생성'"
            [loading]="saving()"
            (onClick)="save()"
          />
        </div>
      </div>
    </p-card>
  }
</div>

<p-toast />
