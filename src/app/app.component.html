<div class="min-h-screen flex flex-col bg-gray-50">
  <!-- Top Nav -->
  <p-menubar [model]="menuItems" styleClass="border-0 border-b border-gray-200 rounded-none px-4">
    <ng-template pTemplate="start">
      <span class="text-lg font-bold text-primary-600 mr-6">한마음 D+N</span>
    </ng-template>

    <ng-template pTemplate="end">
      <div class="flex items-center gap-3">
        @if (auth.isAuthenticated()) {
          <span class="text-sm text-gray-600">{{ auth.username() }}</span>
          <p-button
            label="로그아웃"
            icon="pi pi-sign-out"
            [text]="true"
            size="small"
            (onClick)="auth.logout()"
          />
        }
      </div>
    </ng-template>
  </p-menubar>

  <!-- Main content -->
  <main class="flex-1">
    <router-outlet />
  </main>
</div>
